<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dice outer body -->
  <rect x="4" y="4" width="92" height="92" rx="18" fill="#1a1a3e" stroke="#4466bb" stroke-width="3"/>
  <rect x="8" y="8" width="84" height="84" rx="14" fill="#f8f8ff" stroke="#ccd" stroke-width="1.5"/>

  <!-- Pokeball inside dice -->
  <circle cx="50" cy="50" r="28" fill="#fafafa" stroke="#222" stroke-width="2.5"/>
  <path d="M22 50 A28 28 0 0 1 78 50 Z" fill="#e53935"/>
  <line x1="22" y1="50" x2="78" y2="50" stroke="#222" stroke-width="2.5"/>
  <circle cx="50" cy="50" r="9.5" fill="#222"/>
  <circle cx="50" cy="50" r="6.5" fill="white"/>
  <circle cx="50" cy="50" r="3" fill="#e0e0e0"/>

  <!-- Dice corner dots -->
  <circle cx="18" cy="18" r="4.5" fill="#4488dd" opacity="0.85"/>
  <circle cx="82" cy="18" r="4.5" fill="#4488dd" opacity="0.85"/>
  <circle cx="18" cy="82" r="4.5" fill="#4488dd" opacity="0.85"/>
  <circle cx="82" cy="82" r="4.5" fill="#4488dd" opacity="0.85"/>
</svg>
